#!/usr/bin/env bash
# ──────────────────────────────────────────────────────────
# DBT Platform — Backup Configuration
# Source this file before running backup scripts.
# Override any value by setting the env var beforehand.
# ──────────────────────────────────────────────────────────

# ── Backup root (on host, outside containers) ──
BACKUP_ROOT="${BACKUP_ROOT:-/backup}"

# ── Retention (days) ──
RETENTION_FULL_DAYS="${RETENTION_FULL_DAYS:-30}"          # Keep 30 days of full backups
RETENTION_INCREMENTAL_DAYS="${RETENTION_INCREMENTAL_DAYS:-7}"  # Keep 7 days of incrementals

# ── Docker compose project name ──
COMPOSE_PROJECT="${COMPOSE_PROJECT:-dbt}"

# ── MongoDB ──
# IMPORTANT: There are TWO MongoDB instances on this server:
#   1. Host system mongod (127.0.0.1:27017) — systemd service, stale/empty
#   2. Docker MongoDB (dbt-mongodb-1, 127.0.0.1:27018→:27017) — REAL data
# Django connects to the Docker instance via compose network (mongodb:27017).
# Backup scripts target dbt-mongodb-1 and run a preflight check
# (>= 15 business collections) to guard against accidentally backing up
# the empty host instance.
MONGO_CONTAINER="${MONGO_CONTAINER:-dbt-mongodb-1}"
MONGO_DB="${MONGO_DB:-dbt_platform}"
MONGO_USER="${MONGO_USER:-dbt_app}"
MONGO_PASSWORD="${MONGO_PASSWORD:-dbt_dev_password}"
MONGO_AUTH_DB="${MONGO_AUTH_DB:-dbt_platform}"

# ── Qdrant ──
QDRANT_CONTAINER="${QDRANT_CONTAINER:-dbt-qdrant-1}"
QDRANT_COLLECTION="${QDRANT_COLLECTION:-dbt_knowledge}"
QDRANT_PORT="${QDRANT_PORT:-6333}"

# ── MinIO ──
MINIO_CONTAINER="${MINIO_CONTAINER:-dbt-minio-1}"
MINIO_BUCKET="${MINIO_BUCKET:-dbt-platform}"

# ── Redis ──
REDIS_CONTAINER="${REDIS_CONTAINER:-dbt-redis-1}"

# ── App files to backup (relative to project root) ──
PROJECT_ROOT="${PROJECT_ROOT:-/root/program/DBT}"
APP_FILES_TO_BACKUP=(
    ".env"
    "docker-compose.yml"
    "docker/nginx.conf"
    "docker/mongo-init.js"
)

# ── Logging ──
LOG_FILE="${BACKUP_ROOT}/backup.log"
